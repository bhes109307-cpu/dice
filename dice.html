<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬年好運骰子</title>
    <style>
        /* --- 全局設定 --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #a90e0e 0%, #d11a1a 100%);
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 400px;
        }

        /* --- 標題與裝飾 --- */
        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px #000;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #fff;
            opacity: 0.9;
        }

        .horse-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        /* --- 骰子區域 --- */
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 2rem 0;
            perspective: 1000px;
        }

        .die {
            width: 80px;
            height: 80px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: inset 0 0 10px #ccc, 0 5px 15px rgba(0,0,0,0.3);
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 6px;
            transition: transform 0.5s ease;
        }

        .dot {
            background-color: #333;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            align-self: center;
            justify-self: center;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        /* 紅色點點 (傳統中式骰子 1 和 4 是紅色的) */
        .die[data-face="1"] .dot,
        .die[data-face="4"] .dot {
            background-color: #d32f2f;
        }

        /* 骰子點數佈局邏輯 */
        /* 隱藏不需要的點 */
        .die .dot { visibility: hidden; }

        /* Face 1 */
        .die[data-face="1"] .dot:nth-child(5) { visibility: visible; width: 24px; height: 24px; } /* 中間大紅點 */

        /* Face 2 */
        .die[data-face="2"] .dot:nth-child(1),
        .die[data-face="2"] .dot:nth-child(9) { visibility: visible; }

        /* Face 3 */
        .die[data-face="3"] .dot:nth-child(1),
        .die[data-face="3"] .dot:nth-child(5),
        .die[data-face="3"] .dot:nth-child(9) { visibility: visible; }

        /* Face 4 */
        .die[data-face="4"] .dot:nth-child(1),
        .die[data-face="4"] .dot:nth-child(3),
        .die[data-face="4"] .dot:nth-child(7),
        .die[data-face="4"] .dot:nth-child(9) { visibility: visible; }

        /* Face 5 */
        .die[data-face="5"] .dot:nth-child(1),
        .die[data-face="5"] .dot:nth-child(3),
        .die[data-face="5"] .dot:nth-child(5),
        .die[data-face="5"] .dot:nth-child(7),
        .die[data-face="5"] .dot:nth-child(9) { visibility: visible; }

        /* Face 6 */
        .die[data-face="6"] .dot:nth-child(1),
        .die[data-face="6"] .dot:nth-child(3),
        .die[data-face="6"] .dot:nth-child(4),
        .die[data-face="6"] .dot:nth-child(6),
        .die[data-face="6"] .dot:nth-child(7),
        .die[data-face="6"] .dot:nth-child(9) { visibility: visible; }


        /* --- 動畫 --- */
        .rolling {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg) translate(0, 0); }
            25% { transform: rotate(10deg) translate(5px, 5px); }
            50% { transform: rotate(-10deg) translate(-5px, -5px); }
            75% { transform: rotate(5deg) translate(5px, -5px); }
            100% { transform: rotate(0deg) translate(0, 0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* --- 按鈕 --- */
        button {
            background: linear-gradient(to bottom, #ffeb3b, #ffc107);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            color: #a90e0e;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #b38f00, 0 10px 10px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #b38f00, 0 0 5px rgba(0,0,0,0.3);
        }

        button:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(5px);
        }

        /* --- 結果顯示 --- */
        #result-area {
            margin-top: 1.5rem;
            min-height: 80px;
        }

        .result-total {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .lucky-msg {
            color: #ffeb3b;
            font-size: 1.4rem;
            margin-top: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="horse-icon">🐎</div>
        <h1>馬年行大運</h1>
        <div class="subtitle">金馬奔騰 財源滾滾</div>

        <div class="dice-container">
            <div class="die" id="die1" data-face="1">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="die" id="die2" data-face="6">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="die" id="die3" data-face="4">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <button id="rollBtn" onclick="rollDice()">試試手氣</button>

        <div id="result-area">
            <div class="result-total" id="totalText">點擊按鈕開始擲骰</div>
            <div class="lucky-msg" id="luckyMsg"></div>
        </div>
    </div>

    <script>
        // 馬年吉祥話庫
        const horsePhrases = [
            "馬到成功，事事順心！",
            "龍馬精神，活力滿滿！",
            "一馬當先，引領群倫！",
            "萬馬奔騰，氣勢如虹！",
            "金馬納福，財運亨通！",
            "天馬行空，創意無限！",
            "汗馬功勞，收穫滿滿！",
            "厲兵秣馬，準備起飛！",
            "快馬加鞭，步步高升！",
            "好運接龍，馬上有錢！"
        ];

        function rollDice() {
            const btn = document.getElementById('rollBtn');
            const dice = [
                document.getElementById('die1'),
                document.getElementById('die2'),
                document.getElementById('die3')
            ];
            const totalText = document.getElementById('totalText');
            const luckyMsg = document.getElementById('luckyMsg');
            
            // 鎖定按鈕避免重複點擊
            btn.disabled = true;
            luckyMsg.innerHTML = "";
            totalText.innerHTML = "好運滾動中...";

            // 添加動畫 Class
            dice.forEach(die => {
                die.classList.add('rolling');
            });

            // 播放音效邏輯 (這裡僅用動畫模擬，實際可加 Audio)

            // 模擬滾動時間 0.8秒
            setTimeout(() => {
                let total = 0;
                
                dice.forEach(die => {
                    // 移除動畫
                    die.classList.remove('rolling');
                    
                    // 產生 1-6 隨機數
                    const value = Math.floor(Math.random() * 6) + 1;
                    
                    // 更新骰子面
                    die.setAttribute('data-face', value);
                    
                    total += value;
                });

                // 顯示結果
                totalText.innerHTML = `總點數：${total} 點`;
                
                // 根據點數顯示不同等級的吉祥話
                let message = "";
                if (total >= 16) {
                    message = "🔥 超級大吉！" + "萬馬奔騰，勢不可擋！";
                } else if (total <= 5) {
                    message = "🌸 否極泰來！" + "馬上有轉機，好運將至！";
                } else {
                    // 隨機選一句
                    const randomPhrase = horsePhrases[Math.floor(Math.random() * horsePhrases.length)];
                    message = randomPhrase;
                }
                
                luckyMsg.innerHTML = message;
                
                // 解鎖按鈕
                btn.disabled = false;

            }, 800);
        }
    </script>
</body>
</html>
