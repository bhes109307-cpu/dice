<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬年好運骰子</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a90e0e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* --- 全局設定 --- */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #a90e0e 0%, #d11a1a 100%);
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            color: #fff; overflow: hidden;
        }
        .container {
            text-align: center; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); padding: 2rem;
            border-radius: 20px; border: 2px solid #ffd700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90%; width: 400px;
        }
        h1 { margin-bottom: 0.5rem; font-size: 2.5rem; color: #ffd700; text-shadow: 2px 2px 4px #000; }
        .subtitle { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .horse-icon { font-size: 3rem; margin-bottom: 1rem; display: inline-block; animation: bounce 2s infinite; }

        /* --- 骰子區域 --- */
        .dice-container { display: flex; justify-content: center; gap: 20px; margin: 2rem 0; perspective: 1000px; }
        .die {
            width: 80px; height: 80px; background-color: #fff; border-radius: 12px;
            box-shadow: inset 0 0 10px #ccc, 0 5px 15px rgba(0,0,0,0.3);
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 6px; transition: transform 0.5s ease;
        }
        .dot { background-color: #333; border-radius: 50%; width: 16px; height: 16px; align-self: center; justify-self: center; visibility: hidden; }
        
        .die[data-face="1"] .dot, .die[data-face="4"] .dot { background-color: #d32f2f; }
        .die[data-face="1"] .dot:nth-child(5) { visibility: visible; width: 24px; height: 24px; }
        .die[data-face="2"] .dot:nth-child(1), .die[data-face="2"] .dot:nth-child(9) { visibility: visible; }
        .die[data-face="3"] .dot:nth-child(1), .die[data-face="3"] .dot:nth-child(5), .die[data-face="3"] .dot:nth-child(9) { visibility: visible; }
        .die[data-face="4"] .dot:nth-child(1), .die[data-face="4"] .dot:nth-child(3), .die[data-face="4"] .dot:nth-child(7), .die[data-face="4"] .dot:nth-child(9) { visibility: visible; }
        .die[data-face="5"] .dot:nth-child(1), .die[data-face="5"] .dot:nth-child(3), .die[data-face="5"] .dot:nth-child(5), .die[data-face="5"] .dot:nth-child(7), .die[data-face="5"] .dot:nth-child(9) { visibility: visible; }
        .die[data-face="6"] .dot:nth-child(1), .die[data-face="6"] .dot:nth-child(3), .die[data-face="6"] .dot:nth-child(4), .die[data-face="6"] .dot:nth-child(6), .die[data-face="6"] .dot:nth-child(7), .die[data-face="6"] .dot:nth-child(9) { visibility: visible; }

        .rolling { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
        }

        button {
            background: linear-gradient(to bottom, #ffeb3b, #ffc107); border: none;
            padding: 15px 40px; font-size: 1.5rem; border-radius: 50px;
            color: #a90e0e; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #b38f00; transition: all 0.1s;
        }
        button:active { transform: translateY(5px); box-shadow: none; }
        button:disabled { background: #ccc; color: #666; cursor: not-allowed; }

        #result-area { margin-top: 1.5rem; min-height: 80px; }
        .result-total { font-size: 1.8rem; font-weight: bold; }
        .lucky-msg { color: #ffeb3b; font-size: 1.4rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="horse-icon">🐎</div>
        <h1>馬年行大運</h1>
        <div class="subtitle">金馬奔騰 財源滾滾</div>

        <div class="dice-container">
            <div class="die" id="die1" data-face="1">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="die" id="die2" data-face="6">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="die" id="die3" data-face="4">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <button id="rollBtn" onclick="rollDice()">試試手氣</button>

        <div id="result-area">
            <div class="result-total" id="totalText">點擊按鈕開始擲骰</div>
            <div class="lucky-msg" id="luckyMsg"></div>
        </div>
    </div>

    <script>
        const horsePhrases = ["馬到成功！", "龍馬精神！", "一馬當先！", "萬馬奔騰！", "金馬納福！", "快馬加鞭！"];

        function rollDice() {
            const btn = document.getElementById('rollBtn');
            const dice = [document.getElementById('die1'), document.getElementById('die2'), document.getElementById('die3')];
            const totalText = document.getElementById('totalText');
            const luckyMsg = document.getElementById('luckyMsg');

            btn.disabled = true;
            totalText.innerHTML = "好運滾動中...";
            
            // 觸發手機震動 (如果是 PWA 安裝後效果更好)
            if (navigator.vibrate) navigator.vibrate(100);

            dice.forEach(die => die.classList.add('rolling'));

            setTimeout(() => {
                let total = 0;
                dice.forEach(die => {
                    die.classList.remove('rolling');
                    const value = Math.floor(Math.random() * 6) + 1;
                    die.setAttribute('data-face', value);
                    total += value;
                });

                totalText.innerHTML = `總點數：${total} 點`;
                luckyMsg.innerHTML = total >= 15 ? "🔥 超級大吉！" : horsePhrases[Math.floor(Math.random() * horsePhrases.length)];
                btn.disabled = false;
            }, 800);
        }

        // --- PWA Service Worker 註冊 ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA 服務已就緒'))
                    .catch(err => console.error('註冊失敗', err));
            });
        }
    </script>
</body>
</html>
